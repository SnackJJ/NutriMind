# veRL GRPO Configuration for NutriMind
# Based on veRL's _generated_ppo_trainer.yaml with NutriMind customizations
#
# Usage:
#   python -m verl.trainer.main_ppo \
#       --config-path=configs \
#       --config-name=verl_grpo \
#       algorithm.adv_estimator=grpo

# =============================================================================
# Data Configuration
# =============================================================================
data:
  tokenizer: null
  use_shm: false
  train_files: "data/grpo/verl_train.parquet"
  val_files: "data/grpo/verl_val.parquet"
  train_max_samples: -1
  val_max_samples: -1
  prompt_key: prompt
  reward_fn_key: data_source
  max_prompt_length: 1024
  max_response_length: 2048
  train_batch_size: 16
  val_batch_size: 16
  return_raw_input_ids: false
  return_raw_chat: true
  return_full_prompt: false
  shuffle: true
  seed: 42
  dataloader_num_workers: 8
  validation_shuffle: false
  filter_overlong_prompts: true
  filter_overlong_prompts_workers: 1
  truncation: "error"
  trust_remote_code: false
  return_multi_modal_inputs: false
  sampler: null

# =============================================================================
# Actor/Rollout/Ref Configuration
# =============================================================================
actor_rollout_ref:
  hybrid_engine: true
  nccl_timeout: 600

  model:
    _target_: verl.workers.config.HFModelConfig
    path: "models/nutrimind-4b-sft-merged"
    tokenizer_path: null
    use_shm: false
    trust_remote_code: false
    override_config:
      attn_implementation: "sdpa"
    enable_gradient_checkpointing: true
    enable_activation_offload: false
    use_remove_padding: false
    lora_rank: 16
    lora_alpha: 16
    target_modules:
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
      - "gate_proj"
      - "up_proj"
      - "down_proj"
    use_liger: false
    use_fused_kernels: false

  actor:
    _target_: verl.workers.config.FSDPActorConfig
    strategy: "fsdp"
    rollout_n: ${actor_rollout_ref.rollout.n}
    ppo_mini_batch_size: 16
    ppo_micro_batch_size: null
    ppo_micro_batch_size_per_gpu: 8
    use_dynamic_bsz: false
    ppo_max_token_len_per_gpu: 16384
    clip_ratio: 0.2
    entropy_coeff: 0.01
    calculate_entropy: false
    use_kl_loss: true
    kl_loss_coef: 0.05
    kl_loss_type: "low_var_kl"
    ppo_epochs: 1
    shuffle: false
    data_loader_seed: 42
    use_torch_compile: false
    grad_clip: 1.0
    ulysses_sequence_parallel_size: 1
    use_remove_padding: false
    optim:
      _target_: verl.workers.config.FSDPOptimizerConfig
      lr: 5e-7
      lr_warmup_steps_ratio: 0.0
      total_training_steps: -1
      weight_decay: 0.01
      lr_warmup_steps: -1
      betas: [0.9, 0.999]
      clip_grad: 1.0
    fsdp_config:
      _target_: verl.workers.config.FSDPEngineConfig
      param_offload: false
      optimizer_offload: false
      grad_offload: false
      reshard_after_forward: true
      fsdp_size: -1
      seed: 42
      ulysses_sequence_parallel_size: 1
      use_torch_compile: false
      strategy: "fsdp"
      dtype: "bfloat16"
    checkpoint:
      _target_: verl.trainer.config.CheckpointConfig
      save_contents: ["model", "optimizer", "extra"]

  rollout:
    _target_: verl.workers.config.RolloutConfig
    name: "vllm"
    mode: "async"
    nnodes: 0
    n_gpus_per_node: 2
    temperature: 0.7
    top_k: 50
    top_p: 0.9
    repetition_penalty: 1.0
    prompt_length: 1024
    response_length: 2048
    dtype: "bfloat16"
    gpu_memory_utilization: 0.75
    ignore_eos: false
    enforce_eager: true
    cudagraph_capture_sizes: null
    free_cache_engine: true
    tensor_model_parallel_size: 1
    data_parallel_size: 2
    expert_parallel_size: 1
    pipeline_model_parallel_size: 1
    moe_tensor_parallel_size: 1
    max_num_batched_tokens: 8192
    logprobs_mode: "processed_logprobs"
    scheduling_policy: "fcfs"
    max_model_len: 4096
    max_num_seqs: 32
    enable_chunked_prefill: true
    enable_prefix_caching: true
    load_format: "safetensors"
    layered_summon: false
    layer_name_map: {}
    sglang_engine_mode: "local"
    log_prob_micro_batch_size: null
    log_prob_micro_batch_size_per_gpu: 4
    log_prob_max_token_len_per_gpu: 16384
    log_prob_use_dynamic_bsz: false
    disable_log_stats: true
    multi_stage_wake_up: false
    engine_kwargs: {}
    calculate_log_probs: false
    do_sample: true
    n: 4
    over_sample_rate: 0
    limit_images: null
    skip_tokenizer_init: true
    quantization: null
    quantization_config_file: null
    enable_rollout_routing_replay: false
    enable_sleep_mode: true
    mtp:
      _target_: verl.workers.config.MtpConfig
      enable: false
      enable_train: false
      enable_rollout: false
      detach_encoder: false
      mtp_loss_scaling_factor: 0.1
      speculative_algorithm: "EAGLE"
      speculative_num_steps: 3
      speculative_eagle_topk: 1
      speculative_num_draft_tokens: 4
      method: "mtp"
      num_speculative_tokens: 1
    qat: null
    multi_turn:
      _target_: verl.workers.config.MultiTurnConfig
      enable: true
      max_assistant_turns: 6
      tool_config_path: null
      max_user_turns: 6
      max_parallel_calls: 1
      max_tool_response_length: 2048
      tool_response_truncate_side: "middle"
      interaction_config_path: "configs/verl_interaction.yaml"
      use_inference_chat_template: false
      tokenization_sanity_check_mode: "ignore_strippable"
      format: "hermes"
    val_kwargs:
      _target_: verl.workers.config.SamplingConfig
      top_k: -1
      top_p: 1.0
      temperature: 0
      n: 1
      do_sample: false
    checkpoint_engine:
      _target_: verl.workers.config.CheckpointEngineConfig
      backend: "naive"
      update_weights_bucket_megabytes: 512
      engine_kwargs: {}
    prometheus:
      _target_: verl.workers.config.PrometheusConfig
      enable: false
      port: 9090
      file: "/tmp/ray/session_latest/metrics/prometheus/prometheus.yml"
      served_model_name: null
    agent:
      _target_: verl.workers.config.AgentLoopConfig
      num_workers: 8
      default_agent_loop: "single_turn_agent"
      agent_loop_config_path: null
      custom_async_server:
        _target_: verl.workers.config.CustomAsyncServerConfig
        path: null
        name: null
      agent_loop_manager_class: null
    trace:
      _target_: verl.workers.config.TraceConfig
      project_name: null
      experiment_name: null
      backend: null
      token2text: false
      max_samples_per_step_per_worker: null
    server:
      _target_: verl.workers.config.ServerConfig
      timeout: 60.0
      max_attempts: 3
      retry_delay: 2.0
      max_connections: 1000
      max_start_wait_time: 300.0
    custom: null
    skip_rollout: false
    skip_dump_dir: "~/.verl/rollout_dump"
    profiler: null

  ref:
    _target_: verl.workers.config.FSDPActorConfig
    strategy: "fsdp"
    rollout_n: ${actor_rollout_ref.rollout.n}
    use_torch_compile: false
    log_prob_micro_batch_size: null
    log_prob_micro_batch_size_per_gpu: 4
    log_prob_use_dynamic_bsz: false
    log_prob_max_token_len_per_gpu: 16384
    ulysses_sequence_parallel_size: 1
    fsdp_config:
      _target_: verl.workers.config.FSDPEngineConfig
      param_offload: false
      optimizer_offload: false
      reshard_after_forward: true
      fsdp_size: -1
      seed: 42
      ulysses_sequence_parallel_size: 1
      use_torch_compile: false
      forward_only: true
      strategy: "fsdp"
      dtype: "bfloat16"

# =============================================================================
# Critic Configuration (not used in GRPO but required)
# =============================================================================
critic:
  _target_: verl.workers.config.FSDPCriticConfig
  strategy: "fsdp"
  enable: null
  ppo_mini_batch_size: 16
  ppo_micro_batch_size: null
  ppo_micro_batch_size_per_gpu: 8
  use_dynamic_bsz: false
  ppo_max_token_len_per_gpu: 32768
  forward_max_token_len_per_gpu: 32768
  ppo_epochs: 1
  shuffle: false
  data_loader_seed: 42
  cliprange_value: 0.5
  loss_agg_mode: "token-mean"
  forward_micro_batch_size: null
  forward_micro_batch_size_per_gpu: 8
  ulysses_sequence_parallel_size: 1
  grad_clip: 1.0
  optim:
    _target_: verl.workers.config.FSDPOptimizerConfig
    lr: 1e-5
    lr_warmup_steps_ratio: 0.0
    total_training_steps: -1
    weight_decay: 0.01
    lr_warmup_steps: -1
    betas: [0.9, 0.999]
    clip_grad: 1.0
  model:
    _target_: verl.workers.config.FSDPCriticModelCfg
    use_shm: false
    enable_gradient_checkpointing: true
    enable_activation_offload: false
    use_remove_padding: false
    lora_rank: 0
    lora_alpha: 16
    target_modules: "all-linear"
    fsdp_config:
      _target_: verl.workers.config.FSDPEngineConfig
      param_offload: false
      optimizer_offload: false
      reshard_after_forward: true
      fsdp_size: -1
      seed: 42
      ulysses_sequence_parallel_size: 1
      use_torch_compile: false
      forward_only: false
      strategy: "fsdp"
      dtype: "bfloat16"
  checkpoint:
    _target_: verl.trainer.config.CheckpointConfig
    save_contents: ["model", "optimizer", "extra"]

# =============================================================================
# Algorithm Configuration (GRPO)
# =============================================================================
algorithm:
  _target_: verl.trainer.config.AlgoConfig
  gamma: 1.0
  lam: 1.0
  adv_estimator: "grpo"
  norm_adv_by_std_in_grpo: true
  use_kl_in_reward: false
  kl_penalty: "kl"
  kl_ctrl:
    _target_: verl.trainer.config.KLControlConfig
    type: "fixed"
    kl_coef: 0.001
    horizon: 10000
    target_kl: 0.1
  use_pf_ppo: false

# =============================================================================
# Reward Configuration
# =============================================================================
reward:
  num_workers: 8
  custom_reward_function:
    path: "src/training/grpo/reward.py"
    name: "compute_score"
  reward_manager:
    _target_: verl.workers.config.reward_model.RewardManagerConfig
    source: "register"
    name: "naive"
  reward_model:
    enable: false
    enable_resource_pool: false
    n_gpus_per_node: 2
    nnodes: 0
    model_path: null
  sandbox_fusion:
    url: null
    max_concurrent: 64
    memory_limit_mb: 1024

# =============================================================================
# Trainer Configuration
# =============================================================================
trainer:
  balance_batch: true
  total_epochs: 2
  total_training_steps: null
  project_name: "nutrimind-grpo"
  experiment_name: "qwen3-4b-grpo-v2"
  logger: ["console", "wandb"]
  log_val_generations: 0
  rollout_data_dir: null
  validation_data_dir: null
  nnodes: 1
  n_gpus_per_node: 2
  save_freq: 100
  esi_redundant_time: 0
  resume_mode: "auto"
  resume_from_path: null
  val_before_train: false
  val_only: false
  test_freq: 30
  critic_warmup: 0
  default_hdfs_dir: null
  del_local_ckpt_after_load: false
  default_local_dir: "models/verl_grpo"
  max_actor_ckpt_to_keep: null
  max_critic_ckpt_to_keep: null
  ray_wait_register_center_timeout: 300
  device: "cuda"
  use_legacy_worker_impl: "disable"

# =============================================================================
# Global Profiler Configuration
# =============================================================================
global_profiler:
  _target_: verl.utils.profiler.ProfilerConfig
  tool: null
  enable: false
  steps: null
  profile_continuous_steps: false
  save_path: "outputs/profile"
  global_tool_config:
    nsys:
      discrete: false
    torch_memory:
      trace_alloc_max_entries: 100000
      stack_depth: 32
      context: "all"
      stacks: "all"
      kw_args: {}

# =============================================================================
# Transfer Queue Configuration
# =============================================================================
transfer_queue:
  enable: false

# =============================================================================
# Ray Configuration
# =============================================================================
ray_kwargs:
  ray_init:
    num_cpus: null
  timeline_json_file: null
